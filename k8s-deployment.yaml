apiVersion: apps/v1
kind: Deployment
metadata:
  name: induswatchai-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: induswatchai
  template:
    metadata:
      labels:
        app: induswatchai
    spec:
      containers:
      - name: api
        image: induswatchai:latest
        ports:
        - containerPort: 8000
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: induswatchai-service
spec:
  selector:
    app: induswatchai
  ports:
  - port: 8000
    targetPort: 8000
  type: LoadBalancer